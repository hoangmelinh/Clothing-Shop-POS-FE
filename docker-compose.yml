version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8080
        - VITE_SEPAY_BANK_ACCOUNT=0000000001
        - VITE_SEPAY_BANK_NAME=MBBank
        - VITE_SEPAY_ACCOUNT_NAME=Nguyen Minh Hoang
    container_name: clothing-shop-fe
    restart: always
    ports:
      - "3000:80"
